<div class="login-wrapper">
  <!-- Crystalline Canvas (Background Shards) -->
  <div class="crystalline-canvas">
    <div class="glass-shard shard-1"></div>
    <div class="glass-shard shard-2"></div>
    <div class="glass-shard shard-3"></div>
    <div class="glass-shard shard-4"></div>
  </div>

  <!-- Refraction Sweep Overlay -->
  <div class="refraction-sweep"></div>

  <!-- Central Diamond-Cut Vault -->
  <div class="vault-container animate-vault-reveal">
    <div class="diamond-cut-card glass-panel">
      <header class="vault-header">
        <div class="prism-icon-wrapper floating">
          <i class="fas fa-gem"></i>
        </div>
        <h1>Crystal <span>Portal</span></h1>
        <p>Precision Clinical Authorization</p>
      </header>

      <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm.valid)" class="login-form">
        <div class="form-group" style="--i: 1;">
          <div class="vault-input-nexus">
            <input type="text" id="username" name="username" [(ngModel)]="loginData.username" #username="ngModel"
              required class="form-control vault-underbar" placeholder="Registry Key"
              [ngClass]="{ 'is-invalid': username.invalid && (username.dirty || username.touched || loginForm.submitted) }" />
            <div class="laser-focus-line"></div>
            <i class="fas fa-key field-icon"></i>
          </div>
          <div *ngIf="username.invalid && (username.dirty || username.touched || loginForm.submitted)"
            class="invalid-feedback animate-flicker">
            Registry key authentication required
          </div>
        </div>

        <div class="form-group" style="--i: 2;">
          <div class="vault-input-nexus">
            <input type="password" id="password" name="password" [(ngModel)]="loginData.password" #password="ngModel"
              required class="form-control vault-underbar" placeholder="Security Passcode"
              [ngClass]="{ 'is-invalid': password.invalid && (password.dirty || password.touched || loginForm.submitted) }" />
            <div class="laser-focus-line"></div>
            <i class="fas fa-unlock-alt field-icon"></i>
          </div>
          <div *ngIf="password.invalid && (password.dirty || password.touched || loginForm.submitted)"
            class="invalid-feedback animate-flicker">
            Digital signature required
          </div>
        </div>

        <div *ngIf="error" class="alert-danger animate-glitch">
          <i class="fas fa-microchip"></i> AUTHENTICATION ERROR: {{ error }}
        </div>

        <button type="submit" [disabled]="loading" class="login-btn premium-btn crystal-pulse animate-fade-in"
          style="--i: 3;">
          <span *ngIf="loading" class="spinner"></span>
          <span *ngIf="!loading">AUTHORIZE SESSION</span>
        </button>

        <footer class="vault-footer animate-fade-in" style="--i: 4;">
          <p>Secure Vault Protocol v14.0 • Zero-Trust active</p>
        </footer>
      </form>
    </div>
  </div>
</div>
