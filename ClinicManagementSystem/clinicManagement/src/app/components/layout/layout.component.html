<div class="app-layout">
  <aside class="sidebar">
    <div class="brand">
      <h1 class="brand-title"><span class="text-primary">CLINICSYSTEM</span></h1>
    </div>


    <nav class="nav-menu">
      


      <div class="nav-links">
        <a *ngFor="let item of navItems" [routerLink]="item.path" routerLinkActive="active" class="nav-item">
          <span class="nav-icon" [innerHTML]="item.icon"></span>
          <span class="nav-text">{{ item.label }}</span>
        </a>
      </div>

    </nav>

    <div class="sidebar-footer">
      <button class="nav-item logout-btn" (click)="logout()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        Log out
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-header">
      <div class="search-bar">
        <!-- Optional search bar placeholder -->
      </div>
      <div class="user-profile">
        <div class="avatar">{{ userName.charAt(0).toUpperCase() || 'U' }}</div>
        <div class="user-info">
          <span class="user-name">{{ roleName === 'Doctor' ? 'Dr.' : '' }} {{ userName }}</span>
          <span class="user-role">{{ roleName }}</span>
        </div>
      </div>
    </header>

    <div class="router-container" #scrollContainer (scroll)="onScroll($event)">
      <router-outlet></router-outlet>
    </div>

    <!-- Scroll to Top Button (FAB) -->
    <button class="scroll-top-btn" [class.show]="showScrollButton" (click)="scrollToTop(scrollContainer)"
      title="Scroll to Top">
      <i class="fas fa-arrow-up"></i>
    </button>
  </main>
</div>
